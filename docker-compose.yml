# ─────────────────────────────────────────────────────────────────────────────
#  AI Health Companion — Docker Compose
#  Start everything:  docker compose up -d
#  Stop everything:   docker compose down
#  Wipe volumes:      docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8 ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ai-health-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ai-health-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin", "ping",
          "-h", "localhost",
          "-u", "root",
          "--password=${MYSQL_ROOT_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s


  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-health-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL so it points at the mysql service, not localhost
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      # CORS origins as JSON array (pydantic-settings v2 expects JSON for List fields)
      CORS_ORIGINS: '["http://localhost","http://localhost:4200","http://localhost:80"]'
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - prescription_uploads:/app/uploads
    networks:
      - ai-health-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s


  # ── Angular Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-health-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - ai-health-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  prescription_uploads:
    driver: local


# ── Dedicated bridge network ──────────────────────────────────────────────────
networks:
  ai-health-network:
    driver: bridge


